<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>OpenVINO Qwen2 Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --bg-elevated: #020617;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.1);
        --border: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --user: #22c55e;
        --assistant: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        background: radial-gradient(circle at top left, #0f172a 0, #020617 45%, #000 100%);
        color: var(--text);
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 16px;
      }

      .app {
        width: 100%;
        max-width: 960px;
        border-radius: 24px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background:
          radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.06), transparent 55%),
          radial-gradient(circle at 100% 0, rgba(34, 197, 94, 0.06), transparent 50%),
          linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.95));
        box-shadow:
          0 40px 120px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(148, 163, 184, 0.16);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        padding: 20px 24px 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.1), transparent 55%);
        opacity: 0.9;
        pointer-events: none;
      }

      .header-main {
        position: relative;
        z-index: 1;
      }

      .logo {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background:
          conic-gradient(from 220deg, #38bdf8, #22c55e, #eab308, #38bdf8);
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .logo-inner {
        width: 100%;
        height: 100%;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 0, #ffffff, #020617);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #38bdf8;
        box-shadow:
          0 0 16px rgba(56, 189, 248, 0.9),
          0 0 40px rgba(56, 189, 248, 0.8);
      }

      .title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .pill-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .pill {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9));
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-muted);
      }

      .pill-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
      }

      .pill-npu {
        border-color: rgba(56, 189, 248, 0.8);
        color: #e0f2fe;
      }

      .pill-npu-dot {
        background: #38bdf8;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.9);
      }

      .pill-model {
        border-color: rgba(248, 250, 252, 0.6);
      }

      .header-side {
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        position: relative;
        z-index: 1;
      }

      .status {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.7);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-muted);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f97316;
        box-shadow: 0 0 14px rgba(249, 115, 22, 0.9);
      }

      .status-dot.ready {
        background: #22c55e;
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.9);
      }

      .body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 14px 14px;
        gap: 10px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 8px 4px;
        border-radius: 18px;
        border: 1px solid rgba(31, 41, 55, 0.9);
        background:
          radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.98)),
          radial-gradient(circle at 100% 100%, rgba(15, 23, 42, 0.95), #020617);
        box-shadow:
          inset 0 1px 0 rgba(148, 163, 184, 0.15),
          0 18px 40px rgba(15, 23, 42, 0.85);
      }

      .message-row {
        display: flex;
        margin-bottom: 10px;
        gap: 8px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-avatar {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        flex-shrink: 0;
        margin-top: 3px;
      }

      .message-avatar.user {
        background: radial-gradient(circle at 0 0, #22c55e, #15803d);
      }

      .message-avatar.assistant {
        background: radial-gradient(circle at 0 0, #38bdf8, #0ea5e9);
      }

      .message-bubble {
        max-width: min(100%, 620px);
        padding: 9px 11px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.5;
        border: 1px solid rgba(15, 23, 42, 0.8);
        background: radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.96), #020617);
        box-shadow:
          0 10px 25px rgba(15, 23, 42, 0.85),
          inset 0 1px 0 rgba(148, 163, 184, 0.15);
        white-space: pre-wrap;
      }

      .message-row.user .message-bubble {
        background: radial-gradient(circle at 100% 0, rgba(22, 163, 74, 0.18), rgba(15, 23, 42, 0.96));
        border-color: rgba(34, 197, 94, 0.55);
      }

      .message-row.assistant .message-bubble {
        background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), rgba(15, 23, 42, 0.97));
        border-color: rgba(56, 189, 248, 0.55);
      }

      .message-meta {
        font-size: 10px;
        color: var(--text-muted);
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .message-role {
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .message-role.user {
        color: rgba(45, 212, 191, 0.9);
      }

      .message-role.assistant {
        color: rgba(129, 140, 248, 0.9);
      }

      .message-time {
        opacity: 0.75;
      }

      .input-area {
        padding: 10px 4px 2px;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }

      .textarea-wrap {
        flex: 1;
        position: relative;
      }

      textarea {
        width: 100%;
        min-height: 52px;
        max-height: 140px;
        resize: none;
        border-radius: 16px;
        border: 1px solid rgba(31, 41, 55, 0.9);
        background:
          radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.96), #020617),
          linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.98));
        color: var(--text);
        padding: 9px 11px;
        font-size: 13px;
        line-height: 1.4;
        box-shadow:
          inset 0 1px 0 rgba(148, 163, 184, 0.16),
          0 16px 40px rgba(15, 23, 42, 0.9);
      }

      textarea:focus {
        outline: none;
        border-color: rgba(56, 189, 248, 0.9);
        box-shadow:
          0 0 0 1px rgba(56, 189, 248, 0.7),
          0 20px 50px rgba(15, 23, 42, 0.95),
          inset 0 1px 0 rgba(148, 163, 184, 0.16);
      }

      textarea::placeholder {
        color: rgba(148, 163, 184, 0.85);
      }

      .send-btn {
        border-radius: 999px;
        border: none;
        background:
          radial-gradient(circle at 0 0, #38bdf8, #0ea5e9),
          linear-gradient(135deg, #06b6d4, #0ea5e9);
        color: white;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow:
          0 18px 40px rgba(8, 47, 73, 0.9),
          0 0 0 1px rgba(56, 189, 248, 0.2);
        flex-shrink: 0;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          filter 0.18s ease,
          opacity 0.12s ease;
      }

      .send-btn svg {
        width: 18px;
        height: 18px;
      }

      .send-btn:disabled {
        opacity: 0.45;
        cursor: default;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.9);
      }

      .send-btn:not(:disabled):hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow:
          0 22px 55px rgba(8, 47, 73, 0.95),
          0 0 0 1px rgba(56, 189, 248, 0.35);
      }

      .send-btn:not(:disabled):active {
        transform: translateY(0);
        box-shadow:
          0 14px 30px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(56, 189, 248, 0.4);
      }

      .hint-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--text-muted);
        padding: 0 2px 2px;
      }

      .hint-row span {
        opacity: 0.9;
      }

      .hint-row code {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(31, 41, 55, 0.9);
      }

      .typing {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        padding: 2px 0;
      }

      .typing-dot {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.9);
        animation: pulse 1.2s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.16s;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 0.32s;
      }

      @keyframes pulse {
        0%, 80%, 100% {
          transform: scale(1);
          opacity: 0.55;
        }
        40% {
          transform: scale(1.5);
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }

        .app {
          border-radius: 20px;
        }

        .header {
          padding-inline: 16px;
        }

        .body {
          padding-inline: 10px;
        }

        .messages {
          padding-inline: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="logo">
          <div class="logo-inner">
            <div class="logo-dot"></div>
          </div>
        </div>
        <div class="header-main">
          <div class="title">
            <span>Домовой ассистент</span>
            <span style="font-size: 11px; font-weight: 500; opacity: 0.85;">на OpenVINO + Qwen2</span>
          </div>
          <div class="subtitle">
            Локальный LLM‑ассистент на Beelink GTi15 Ultra с использованием Intel NPU / Arc.
          </div>
          <div class="pill-row">
            <div class="pill pill-npu">
              <span class="pill-npu-dot pill-dot"></span>
              <span>Intel NPU / Arc • OpenVINO</span>
            </div>
            <div class="pill pill-model">
              <span class="pill-dot" style="background:#eab308; box-shadow:0 0 10px rgba(234,179,8,0.9);"></span>
              <span>Qwen2‑7B‑Instruct (через Optimum‑Intel)</span>
            </div>
          </div>
        </div>
        <div class="header-side">
          <div class="status" id="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Загрузка модели…</span>
          </div>
        </div>
      </header>
      <main class="body">
        <section class="messages" id="messages"></section>
        <section class="input-area">
          <div class="input-row">
            <div class="textarea-wrap">
              <textarea
                id="input"
                rows="2"
                placeholder="Спроси ассистента о настройке умного дома, сценариях, автоматизациях или чём‑то ещё…"
              ></textarea>
            </div>
            <button class="send-btn" id="send" aria-label="Отправить">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M5 20.5L20.25 12 5 3.5 5 10.5 14.5 12 5 13.5 5 20.5Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
          <div class="hint-row">
            <span>Enter — отправить, Shift+Enter — новая строка</span>
            <span>Контекст чата хранится только в браузере.</span>
          </div>
        </section>
      </main>
    </div>
    <script>
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");

      const state = {
        messages: [
          {
            role: "system",
            content:
              "Ты дружелюбный русскоязычный ассистент для умного дома и не только. Ты работаешь локально на мини‑ПК пользователя с OpenVINO и должен отвечать кратко, но по существу.",
          },
        ],
        loading: false,
        modelReady: false,
      };

      function setStatus(ready, text) {
        state.modelReady = ready;
        statusText.textContent = text;
        statusDot.classList.toggle("ready", ready);
      }

      function appendMessage(role, content, { temp } = {}) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = `message-avatar ${role}`;
        avatar.textContent = role === "user" ? "Я" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        const meta = document.createElement("div");
        meta.className = "message-meta";

        const roleEl = document.createElement("span");
        roleEl.className = `message-role ${role}`;
        roleEl.textContent = role === "user" ? "Вы" : "Ассистент";

        const timeEl = document.createElement("span");
        timeEl.className = "message-time";
        const dt = new Date();
        timeEl.textContent = dt.toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });

        meta.appendChild(roleEl);
        meta.appendChild(timeEl);

        if (role === "assistant" && temp === "typing") {
          const typing = document.createElement("span");
          typing.className = "typing";
          for (let i = 0; i < 3; i++) {
            const d = document.createElement("span");
            d.className = "typing-dot";
            typing.appendChild(d);
          }
          bubble.appendChild(meta);
          bubble.appendChild(typing);
        } else {
          const text = document.createElement("div");
          text.textContent = content;
          bubble.appendChild(meta);
          bubble.appendChild(text);
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        return { row, bubble };
      }

      function replaceTyping(bubble, newContent) {
        bubble.innerHTML = "";

        const meta = document.createElement("div");
        meta.className = "message-meta";

        const roleEl = document.createElement("span");
        roleEl.className = "message-role assistant";
        roleEl.textContent = "Ассистент";

        const timeEl = document.createElement("span");
        timeEl.className = "message-time";
        const dt = new Date();
        timeEl.textContent = dt.toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit",
        });

        meta.appendChild(roleEl);
        meta.appendChild(timeEl);

        const text = document.createElement("div");
        text.textContent = newContent;

        bubble.appendChild(meta);
        bubble.appendChild(text);
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || state.loading) return;

        state.loading = true;
        sendBtn.disabled = true;

        state.messages.push({ role: "user", content: text });
        appendMessage("user", text);

        inputEl.value = "";
        const { bubble } = appendMessage("assistant", "", { temp: "typing" });

        try {
          const payload = {
            messages: state.messages,
          };

          const res = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          const reply = data.reply ?? "";
          state.messages.push({ role: "assistant", content: reply });
          replaceTyping(bubble, reply);

          if (!state.modelReady) {
            setStatus(true, "Модель готова к работе");
          }
        } catch (err) {
          console.error(err);
          replaceTyping(
            bubble,
            "Не удалось получить ответ от сервера. Проверь, что контейнер запущен и модель успешно загрузилась."
          );
        } finally {
          state.loading = false;
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener("click", () => {
        sendMessage();
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      window.addEventListener("load", () => {
        setTimeout(() => {
          setStatus(false, "Ожидаем первый запрос (модель может грузиться до нескольких минут)…");
        }, 2000);
      });
    </script>
  </body>
</html>
