substitutions:
  device_name: ups-controller-c3
  friendly_name: "UPS Controller"
  # ВАЖНО: подставьте реальные GPIO, к которым подключены:
  # 1) выход датчика наличия сети (через оптопару)
  # 2) вход релейного модуля (который эмулирует нажатие кнопки UPS)
  grid_gpio: GPIO20
  relay_gpio: GPIO21

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf
  # Для диагностики удобно включить логирование загрузки:
  # early_boot_log: true

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:

#
# Сенсор сети 220В (оптопара 1-Channel Module Optocoupler 220V)
#
binary_sensor:
  - platform: gpio
    name: "UPS Сеть 220В"
    id: ups_grid_present
    device_class: power
    pin:
      number: ${grid_gpio}
      mode:
        input: true
        pullup: true
      # Типовая логика у таких модулей часто: при наличии 220В вход тянется в LOW (через транзистор),
      # поэтому для "ON при наличии сети" обычно нужен inverted: true.
      # Если у вас наоборот (выход HIGH при наличии сети) — поменяйте на inverted: false.
      inverted: true
    filters:
      - delayed_on: 300ms
      - delayed_off: 300ms

#
# Реле, которое "нажимает" кнопку UPS.
# Мы делаем только пульс на 3 секунды через script, а сам GPIO держим internal.
#
switch:
  - platform: gpio
    name: "UPS Кнопка (реле)"
    id: ups_button_relay
    internal: true
    pin:
      number: ${relay_gpio}
      mode:
        output: true
      # Реле замыкается по HIGH на GPIO => pin должен быть активным по HIGH.
      inverted: false
    restore_mode: ALWAYS_OFF

script:
  - id: ups_power_press_pulse
    mode: restart
    then:
      - switch.turn_on: ups_button_relay
      - delay: 3s
      - switch.turn_off: ups_button_relay

#
# Кнопка в Home Assistant:
# одним нажатием (в HA) эмулируем удержание нажатия на UPS-кнопке 3 секунды.
# Это "одна кнопка" ВКЛ/ВЫКЛ — UPS сам разберётся по своему состоянию.
#
button:
  - platform: template
    name: "UPS ВКЛ/ВЫКЛ"
    icon: "mdi:power"
    on_press:
      - script.execute: ups_power_press_pulse

