# docker-compose.yml

services:
  # 1. Ollama — запуск на GPU
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11430:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_NUM_PARALLEL=8
      - OLLAMA_MAX_LOADED_MODELS=1
      # Ниже 5m бывает баг: модель в VRAM, но инференс на CPU (issue #7323)
      - OLLAMA_KEEP_ALIVE=10m
      # Логи: id=GPU vs id=cpu, "offloaded X/X layers to GPU"
      - OLLAMA_DEBUG=1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # 2. Whisper ASR — распознавание речи (CPU: образ GPU не совместим с частью видеокарт)
  # Образ может слушать на 9000 или 9080 — если 401/транскрипция не работают, проверьте логи: Uvicorn running on 0.0.0.0:???
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-asr
    ports:
      - "5001:9080"
    environment:
      - ASR_ENGINE=openai_whisper
      - ASR_MODEL=base
      - ASR_LANGUAGE=ru
    restart: unless-stopped

  # 3. TTS — Qwen3-TTS: Base для Voice Cloning (клон по аудиообразцу, в т.ч. «под Алису»). В Open WebUI модель tts-1-ru.
  # Для RTX 50xx (sm_120): после первой сборки пересобрать с PyTorch nightly: docker build -f Dockerfile.qwen3-tts-sm120 -t qwen3-tts:local . (см. readme)
  qwen3-tts:
    build:
      context: https://github.com/groxaxo/Qwen3-TTS-Openai-Fastapi.git#main
      dockerfile: Dockerfile
      target: production
    image: qwen3-tts:local
    container_name: qwen3-tts
    user: "0:0"
    ports:
      - "5002:8880"
    environment:
      - HOST=0.0.0.0
      - PORT=8880
      - TTS_BACKEND=official
      - TTS_MODEL_NAME=Qwen/Qwen3-TTS-12Hz-1.7B-Base
      - TTS_WARMUP_ON_START=false
      - ENABLE_VOICE_STUDIO=true
      # Дефолтный URL для Voice Studio (используется при старте; в UI должно быть 8880, не 8888)
      - TTS_BASE_URL=http://localhost:8880
      - VOICE_LIBRARY_DIR=/app/voice_library
    volumes:
      - qwen3_tts_hf_cache:/home/appuser/.cache/huggingface
      - qwen3_tts_voice_library:/app/voice_library
    command: ["sh", "-c", "chown -R appuser:appuser /home/appuser/.cache /app/voice_library 2>/dev/null || true; exec runuser -u appuser -- env HOST=0.0.0.0 PORT=8880 WORKERS=1 ENABLE_VOICE_STUDIO=true TTS_BASE_URL=http://localhost:8880 python -m api.main"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  # 4. Open WebUI — интерфейс с поддержкой голоса
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # По умолчанию — Ollama в Docker. Если в Docker GPU 0% (RTX 50 + WSL2), переключи на Windows Ollama:
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # и запускай без сервиса ollama: docker compose up -d whisper qwen3-tts open-webui
      - OLLAMA_BASE_URL=http://ollama:11434
      - WHISPER_API_BASE_URL=http://whisper:9080
      # Backend TTS = Qwen3-TTS (OpenAI-совместимый API). Без AUDIO_TTS_ENGINE=openai в списке только «Браузер» и «По умолчанию» без backend.
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://qwen3-tts:8880/v1
      - AUDIO_TTS_MODEL=tts-1-ru
      # Голос по умолчанию: сохранённый в Voice Studio профиль (clone:Alice) или пресет (Vivian, Ryan…)
      - AUDIO_TTS_VOICE=clone:Alice
      # Чтобы голосовые запросы (транскрипция) не давали 401 при отправке с фронта
      - ENABLE_API_KEY_ENDPOINT_RESTRICTIONS=false
    depends_on:
      - ollama
      - whisper
      - qwen3-tts
    restart: unless-stopped

volumes:
  ollama_data:
  openwebui_data:
  qwen3_tts_hf_cache:
  qwen3_tts_voice_library: