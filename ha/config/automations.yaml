- id: fridge_cycle_on
  alias: Включить розетку на 1 час (цикл 4ч)
  triggers:
    - hours: /4
      trigger: time_pattern
  actions:
    - target:
        entity_id: switch.t34_smart_plug_switch_1
      action: switch.turn_on
    - delay:
        hours: 1
    - target:
        entity_id: switch.t34_smart_plug_switch_1
      action: switch.turn_off

- id: ups_power_loss_telegram
  alias: "UPS: пропало входное питание (Telegram)"
  description: Отправляет уведомление в Telegram, когда UPS переходит на батарею.
  mode: single
  triggers:
    - trigger: template
      value_template: >
        {{ states('sensor.ippon_status_data') not in ['unknown','unavailable','none','']
           and 'OB' in states('sensor.ippon_status_data') }}
      for:
        seconds: 10
  actions:
    - action: telegram_bot.send_message
      data:
        target:
          - !secret telegram_chat_id
        message: >-
          ⚠️ Пропало входное питание 220V.
          UPS перешел на батарею ({{ states('sensor.ippon_status_data') }}).
          Заряд: {{ states('sensor.ippon_battery_charge') }}%.
          Вход: {{ states('sensor.ippon_input_voltage') }} V.

- id: ups_power_restore_telegram
  alias: "UPS: сеть восстановлена (Telegram)"
  description: Отправляет уведомление в Telegram, когда входное питание 220V восстановлено.
  mode: single
  triggers:
    - trigger: template
      value_template: >
        {{ states('sensor.ippon_status_data') not in ['unknown','unavailable','none','']
           and 'OL' in states('sensor.ippon_status_data') }}
      for:
        seconds: 10
  actions:
    - action: telegram_bot.send_message
      data:
        target:
          - !secret telegram_chat_id
        message: >-
          ✅ Входное питание 220V восстановлено.
          UPS вернулся в режим линии ({{ states('sensor.ippon_status_data') }}).
          Заряд: {{ states('sensor.ippon_battery_charge') }}%.
          Вход: {{ states('sensor.ippon_input_voltage') }} V.

- id: ups_low_battery_telegram
  alias: "UPS: низкий заряд аккумулятора (Telegram)"
  description: Отправляет уведомление в Telegram, когда заряд аккумулятора UPS ниже 30%.
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: sensor.ippon_battery_charge
      below: 30
      for:
        minutes: 1
  actions:
    - action: telegram_bot.send_message
      data:
        target:
          - !secret telegram_chat_id
        message: >-
          🔋 Низкий заряд UPS: {{ states('sensor.ippon_battery_charge') }}%.
          Статус: {{ states('sensor.ippon_status_data') }}.
          Вход: {{ states('sensor.ippon_input_voltage') }} V.

- id: tuya_domik_unavailable_telegram
  alias: "Tuya: domik_switch недоступен (Telegram)"
  description: Проверяет каждые 10 минут и уведомляет, если switch.domik_switch недоступен.
  mode: single
  triggers:
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: state
      entity_id: switch.domik_switch
      state: unavailable
  actions:
    - action: telegram_bot.send_message
      data:
        target:
          - !secret telegram_chat_id
        message: >-
          ⚠️ Tuya недоступна: switch.domik_switch в состоянии unavailable
          (проверка каждые 10 минут, {{ now().strftime('%d.%m.%Y %H:%M') }}).

